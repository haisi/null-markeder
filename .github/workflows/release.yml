name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set project version
        run: mvn --batch-mode versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Build and stage artifacts
        run: mvn --batch-mode --no-transfer-progress clean deploy -DskipTests=false

      - name: Run JReleaser
        uses: jreleaser/release-action@v2
        with:
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD }}

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-logs
          path: out/jreleaser/**

      - name: Trigger javadoc.io indexing
        continue-on-error: true
        run: |
          version="${{ steps.version.outputs.version }}"
          pom_url="https://repo1.maven.org/maven2/li/selman/null-markeder/${version}/null-markeder-${version}.pom"
          for i in $(seq 1 30); do
            if curl -sfL -o /dev/null "$pom_url"; then
              echo "Artifact visible on Maven Central, requesting javadoc.io build"
              curl -sL -o /dev/null "https://javadoc.io/doc/li.selman/null-markeder/${version}"
              exit 0
            fi
            echo "Waiting for Maven Central sync... (attempt $i/30)"
            sleep 60
          done
          echo "Timed out waiting for Maven Central sync; javadoc.io will need a manual nudge"
