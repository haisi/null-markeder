name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: >
        The package layout and/or package-info.java content that triggers the issue, and the
        PackageInfoGenerator call you made.
      render: java
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: null-markeder version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "25"
    validations:
      required: true
